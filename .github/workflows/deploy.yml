name: Optimized Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # This automatically handles basic caching for npm/yarn
          cache: 'npm'

      - name: Cache Node Modules
        id: cache-nodemodules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Dependencies
        if: steps.cache-nodemodules.outputs.cache-hit != 'true'
        run: npm install

      - name: Build Project
        # Vite's build is naturally fast, but ensuring dependencies are cached 
        # is the best way to keep this under 1 minute.
        run: npm run build

      - name: Deploy to Server via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "dist/" 
          TARGET: "/var/www/sian_corporate"
          # ARGS Explanation:
          # -a: archive mode (preserves permissions)
          # -z: compress during transfer (faster)
          # --delete: removes files on server that were deleted in git
          ARGS: "-az --delete"